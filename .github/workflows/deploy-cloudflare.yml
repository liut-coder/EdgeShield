name: Deploy to Cloudflare

on:
  workflow_dispatch:
    inputs:
      worker_name:
        description: "Cloudflare Worker name"
        required: true
        default: "edge-waf-v0-1"
      kv_namespace:
        description: "KV namespace title, created if missing"
        required: true
        default: "edge-waf-v0-kv"
      account_id:
        description: "Optional Cloudflare Account ID; falls back to CLOUDFLARE_ACCOUNT_ID secret or automatic resolution"
        required: false
        default: ""
      account_name:
        description: "Optional Cloudflare Account name; falls back to CLOUDFLARE_ACCOUNT_NAME secret"
        required: false
        default: ""
      zone_id:
        description: "Optional Cloudflare Zone ID; falls back to CLOUDFLARE_ZONE_ID secret"
        required: false
        default: ""
      zone_name:
        description: "Optional Cloudflare Zone name, such as example.com; falls back to CLOUDFLARE_ZONE_NAME secret"
        required: false
        default: ""
      protected_hostname:
        description: "Hostname to protect, such as www.example.com; falls back to PROTECTED_HOSTNAME secret"
        required: false
        default: ""
      protected_path_prefix:
        description: "Optional path prefix to protect, such as /login; falls back to PROTECTED_PATH_PREFIX secret"
        required: false
        default: ""
      snippet_name:
        description: "Cloudflare Snippet name; lowercase letters, digits, and underscores only"
        required: true
        default: "edge_waf_gate"
      snippet_expression:
        description: "Optional Cloudflare rule expression; overrides protected_hostname when set"
        required: false
        default: ""

jobs:
  deploy:
    name: Deploy Worker, KV, and Snippet
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ inputs.account_id || secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_ACCOUNT_NAME: ${{ inputs.account_name || secrets.CLOUDFLARE_ACCOUNT_NAME }}
      CLOUDFLARE_ZONE_ID: ${{ inputs.zone_id || secrets.CLOUDFLARE_ZONE_ID }}
      CLOUDFLARE_ZONE_NAME: ${{ inputs.zone_name || secrets.CLOUDFLARE_ZONE_NAME }}
      PROTECTED_HOSTNAME: ${{ inputs.protected_hostname || secrets.PROTECTED_HOSTNAME }}
      PROTECTED_PATH_PREFIX: ${{ inputs.protected_path_prefix || secrets.PROTECTED_PATH_PREFIX }}
      WORKER_NAME: ${{ inputs.worker_name }}
      KV_NAMESPACE: ${{ inputs.kv_namespace }}
      SNIPPET_NAME: ${{ inputs.snippet_name }}
      SNIPPET_EXPRESSION: ${{ inputs.snippet_expression }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Validate project
        run: npm run check

      - name: Validate token
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "Missing GitHub secret: CLOUDFLARE_API_TOKEN" >&2
            exit 1
          fi

      - name: Deploy to Cloudflare
        run: npm run deploy:all

      - name: Deployment summary
        run: |
          {
            echo "## EdgeShield deployment"
            echo ""
            echo "- Worker: \`${WORKER_NAME}\`"
            echo "- KV namespace: \`${KV_NAMESPACE}\`"
            echo "- Snippet: \`${SNIPPET_NAME}\`"
            echo "- Protected hostname: \`${PROTECTED_HOSTNAME}\`"
            echo "- Snippet expression: \`${SNIPPET_EXPRESSION:-auto from PROTECTED_HOSTNAME}\`"
            echo ""
            echo "See the Deploy to Cloudflare step logs for the resolved Account ID, Worker URL, KV id, and Zone details."
          } >> "${GITHUB_STEP_SUMMARY}"
